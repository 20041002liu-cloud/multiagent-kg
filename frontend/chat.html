<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — KG Assistant</title>
  <script>
    (function () {
      try {
        var ls = window.localStorage;
        var theme = ls.getItem("kgtool.theme");
        document.documentElement.setAttribute("data-theme", theme === "night" ? "night" : "bright");
        if (ls.getItem("kgtool.sidebar_collapsed") === "1") {
          document.documentElement.classList.add("sidebar-collapsed");
        }
        document.documentElement.classList.add("preload-ui");
      } catch (_e) {}
    })();
  </script>
  <link rel="stylesheet" href="./app.css?v=20260504-r4" />
</head>
<body data-theme="bright">
  <header class="topbar">
    <div class="brand-row">
      <button id="sidebarToggleBtn" class="icon-btn sidebar-toggle-btn" data-i18n-title="sidebar.collapse" title="Collapse sidebar" aria-label="Toggle sidebar">
        <svg class="sidebar-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="3"></rect>
          <line x1="10" y1="5" x2="10" y2="19"></line>
        </svg>
      </button>
      <div class="brand">
        <h1>KG Tool</h1>
        <p data-i18n="chat.subtitle">KG Q&A</p>
      </div>
    </div>
    <nav class="nav">
      <a id="nav-kb" href="./kb.html" data-i18n-title="nav.kb">
        <span class="nav-icon" aria-hidden="true">KB</span>
        <span class="nav-label" data-i18n="nav.kb">KB Manager</span>
      </a>
      <a id="nav-kg" href="./kg.html" data-i18n-title="nav.kg">
        <span class="nav-icon" aria-hidden="true">KG</span>
        <span class="nav-label" data-i18n="nav.kg">KG Explorer</span>
      </a>
    </nav>
    <div class="head-right">
      <button id="settingsBtn" class="btn secondary settings-trigger" data-i18n="settings.open">Settings</button>
      <div id="healthPill" class="pill neutral" data-i18n="pill.checking">Checking...</div>
      <div id="modelPill" class="pill neutral" data-i18n="pill.model_unknown">Model: unknown</div>
    </div>
  </header>

  <div id="settingsBackdrop" class="settings-backdrop"></div>
  <aside id="settingsPanel" class="settings-panel">
    <div class="settings-panel-head">
      <h3 data-i18n="settings.title">Display and Preferences</h3>
      <button id="settingsCloseBtn" class="icon-btn" data-i18n-title="settings.close" title="Close">&times;</button>
    </div>
    <div class="settings-fields">
      <label class="settings-field">
        <span data-i18n="settings.label.kb">Default Knowledge Base</span>
        <select id="kbSelect" class="kb-select" data-kb-select></select>
      </label>
      <label class="settings-field">
        <span data-i18n="settings.label.lang">Language</span>
        <select id="langSelect" class="theme-select">
          <option value="zh" data-i18n="lang.zh">中文</option>
          <option value="en" data-i18n="lang.en">English</option>
        </select>
      </label>
      <label class="settings-field">
        <span data-i18n="settings.label.theme">Theme</span>
        <select id="themeSelect" class="theme-select">
          <option value="bright" data-i18n="theme.bright">Bright</option>
          <option value="night" data-i18n="theme.night">Night</option>
        </select>
      </label>
    </div>
  </aside>

  <main class="page">
    <section class="card chat-card">
      <div class="card-title-row">
        <h2 data-i18n="nav.chat">Chat</h2>
        <span class="chat-kb-badge" id="chatKbBadge">-</span>
        <button id="clearChatBtn" class="btn secondary compact">Clear</button>
      </div>
      <div id="chatMessages" class="chat-messages">
        <div class="chat-empty-state" data-i18n="chat.empty">Ask questions about the current knowledge base.</div>
      </div>
      <div class="chat-input-row">
        <input id="chatInput" class="ctrl-input chat-input" data-i18n-placeholder="chat.input.placeholder" placeholder="Ask a question..." />
        <button id="sendBtn" class="btn" data-i18n="chat.btn.send">Send</button>
      </div>
    </section>
  </main>

  <script src="./common.js?v=20260504-r4"></script>
  <script src="./chat.js?v=20260504-r4"></script>
</body>
</html>
